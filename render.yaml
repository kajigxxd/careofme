# https://dashboard.render.com → New → Blueprint → kajigxxd/careofme
services:
  - type: web
    name: careofme
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: BOT_TOKEN
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: XAI_MODEL
        value: grok-4.5
      - key: DATA_PATH
        value: /tmp/careofme-store.json
      - key: USE_WEBHOOK
        value: "1"
